name: Build and Release Static Nginx

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-nginx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      should_run_build: ${{ steps.compare_versions.outputs.should_run_build }}
      release_version: ${{ steps.get_current_versions.outputs.release_version }}
      nginx_version: ${{ steps.get_current_versions.outputs.nginx_version }}
      openssl_version: ${{ steps.get_current_versions.outputs.openssl_version }}
      jemalloc_version: ${{ steps.get_current_versions.outputs.jemalloc_version }}
      pcre_version: ${{ steps.get_current_versions.outputs.pcre_version }}
      zlib_version: ${{ steps.get_current_versions.outputs.zlib_version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq wget

    - name: Get current versions
      id: get_current_versions
      run: |
        get_current_versions_all=$(curl -s https://raw.githubusercontent.com/hello-yunshu/Xray_bash_onekey_api/refs/heads/main/xray_shell_versions.json)
        nginx_build_online_version=$(echo "$get_current_versions_all" | jq -r '.nginx_build_online_version')
        nginx_online_version=$(echo "$get_current_versions_all" | jq -r '.nginx_online_version')
        openssl_online_version=$(echo "$get_current_versions_all" | jq -r '.openssl_online_version')
        jemalloc_online_version=$(echo "$get_current_versions_all" | jq -r '.jemalloc_online_version')
        latest_pcre2=$(curl -s -H "Authorization: token ${{ github.token }}" https://api.github.com/repos/PCRE2Project/pcre2/releases/latest | jq -r '.tag_name' | sed 's/^pcre2-//')
        latest_zlib=$(curl -s -H "Authorization: token ${{ github.token }}" "https://api.github.com/repos/madler/zlib/tags?per_page=10" | jq -r '[.[].name | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$")) | ltrimstr("v")] | sort_by(split(".") | map(tonumber)) | last // empty')
        release_version="$(date -u '+%Y.%m.%d').${GITHUB_RUN_NUMBER}"

        if [ -z "$nginx_build_online_version" ] || [ -z "$nginx_online_version" ] || \
           [ -z "$openssl_online_version" ] || [ -z "$jemalloc_online_version" ] || \
           [ -z "$latest_pcre2" ] || [ -z "$latest_zlib" ]; then
          echo "Error: One or more current versions are empty."
          exit 1
        fi

        echo "$get_current_versions_all" | jq \
          --arg pcre2 "$latest_pcre2" \
          --arg zlib "$latest_zlib" \
          '. + {pcre2_online_version: $pcre2, zlib_online_version: $zlib}' \
          > .github/current_versions.json

        {
          echo "release_version=$release_version"
          echo "nginx_version=$nginx_online_version"
          echo "openssl_version=$openssl_online_version"
          echo "jemalloc_version=$jemalloc_online_version"
          echo "pcre_version=$latest_pcre2"
          echo "zlib_version=$latest_zlib"
        } >> "$GITHUB_OUTPUT"

    - name: Compare versions
      id: compare_versions
      run: |
        previous_versions=$(jq -c . .github/previous_versions.json 2>/dev/null || echo '{}')
        trigger_build=false

        for field in \
          nginx_online_version \
          openssl_online_version \
          jemalloc_online_version \
          pcre2_online_version \
          zlib_online_version
        do
          current_value=$(jq -r ".$field // \"\"" .github/current_versions.json)
          previous_value=$(echo "$previous_versions" | jq -r ".$field // \"\"")
          echo "$field: previous=$previous_value current=$current_value"
          if [ "$current_value" != "$previous_value" ]; then
            trigger_build=true
          fi
        done

        if [ "$previous_versions" = "{}" ]; then
          trigger_build=true
        fi

        echo "should_run_build=$trigger_build" >> "$GITHUB_OUTPUT"

    - name: Upload current version metadata
      if: ${{ steps.compare_versions.outputs.should_run_build == 'true' || github.event_name == 'workflow_dispatch' }}
      uses: actions/upload-artifact@main
      with:
        name: current-versions
        path: .github/current_versions.json

  build:
    needs: check-versions
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86
          - os: ubuntu-22.04-arm
            arch: arm
    if: ${{ needs.check-versions.outputs.should_run_build == 'true' || github.event_name == 'workflow_dispatch' }}

    env:
      NGINX_BUILD_VERSION: ${{ needs.check-versions.outputs.release_version }}
      NGINX_VERSION: ${{ needs.check-versions.outputs.nginx_version }}
      OPENSSL_VERSION: ${{ needs.check-versions.outputs.openssl_version }}
      JEMALLOC_VERSION: ${{ needs.check-versions.outputs.jemalloc_version }}
      PCRE_VERSION: ${{ needs.check-versions.outputs.pcre_version }}
      ZLIB_VERSION: ${{ needs.check-versions.outputs.zlib_version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Set build metadata
      run: |
        echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"
        echo "BUILD_IMAGE=$(lsb_release -d | cut -f2-)" >> "$GITHUB_ENV"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget curl tar gzip bzip2 xz-utils libtool autoconf automake pkg-config file binutils openssl musl-tools linux-libc-dev
        musl-gcc --version

    - name: Cache OpenSSL
      id: cache-openssl
      uses: actions/cache@main
      with:
        path: |
          ./openssl-${{ env.OPENSSL_VERSION }}/
        key: ${{ runner.os }}-openssl-source-musl-static-v3-${{ matrix.arch }}-${{ env.OPENSSL_VERSION }}

    - name: Download OpenSSL
      if: steps.cache-openssl.outputs.cache-hit != 'true'
      run: |
        wget -nc https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
        tar -zxvf openssl-${{ env.OPENSSL_VERSION }}.tar.gz

    - name: Check OpenSSL download
      run: |
        ls -la ./openssl-${{ env.OPENSSL_VERSION }}/
        if [ ! -d "./openssl-${{ env.OPENSSL_VERSION }}/" ]; then
          echo "OpenSSL download failed!"
          exit 1
        fi

    - name: Cache Jemalloc
      id: cache-jemalloc
      uses: actions/cache@main
      with:
        path: |
          ./jemalloc-${{ env.JEMALLOC_VERSION }}/
        key: ${{ runner.os }}-jemalloc-source-musl-static-v3-${{ matrix.arch }}-${{ env.JEMALLOC_VERSION }}

    - name: Download and extract Jemalloc
      if: steps.cache-jemalloc.outputs.cache-hit != 'true'
      run: |
        wget -nc https://github.com/jemalloc/jemalloc/releases/download/${{ env.JEMALLOC_VERSION }}/jemalloc-${{ env.JEMALLOC_VERSION }}.tar.bz2
        tar -xvf jemalloc-${{ env.JEMALLOC_VERSION }}.tar.bz2

    - name: Build and install Jemalloc
      run: |
        cd jemalloc-${{ env.JEMALLOC_VERSION }}
        CC=musl-gcc ./configure --enable-static --disable-shared --disable-cxx --prefix=/opt/jemalloc CFLAGS="-O3 -fPIC" LDFLAGS="-static"
        make -j$(($(nproc) + 1))
        sudo make install

    - name: Check Jemalloc installation
      run: |
        ls -la /opt/jemalloc/
        if [ ! -f "/opt/jemalloc/lib/libjemalloc.a" ]; then
          echo "Jemalloc static library missing!"
          exit 1
        fi

    - name: Cache PCRE2
      id: cache-pcre2
      uses: actions/cache@main
      with:
        path: |
          ./pcre2-${{ env.PCRE_VERSION }}/
        key: ${{ runner.os }}-pcre2-source-musl-static-v3-${{ matrix.arch }}-${{ env.PCRE_VERSION }}

    - name: Download PCRE2
      if: steps.cache-pcre2.outputs.cache-hit != 'true'
      run: |
        wget -nc https://github.com/PCRE2Project/pcre2/releases/download/pcre2-${{ env.PCRE_VERSION }}/pcre2-${{ env.PCRE_VERSION }}.tar.gz
        tar -xf pcre2-${{ env.PCRE_VERSION }}.tar.gz

    - name: Build and install PCRE2
      run: |
        cd pcre2-${{ env.PCRE_VERSION }}
        CC=musl-gcc ./configure --prefix=/opt/pcre2 --enable-static --disable-shared --enable-jit CFLAGS="-O3 -fPIC" LDFLAGS="-static"
        make -j$(($(nproc) + 1))
        sudo make install

    - name: Check PCRE2 installation
      run: |
        ls -la /opt/pcre2/
        if [ ! -f "/opt/pcre2/lib/libpcre2-8.a" ]; then
          echo "PCRE2 static library missing!"
          exit 1
        fi

    - name: Cache zlib
      id: cache-zlib
      uses: actions/cache@main
      with:
        path: |
          ./zlib-${{ env.ZLIB_VERSION }}/
        key: ${{ runner.os }}-zlib-source-musl-static-v3-${{ matrix.arch }}-${{ env.ZLIB_VERSION }}

    - name: Download zlib
      if: steps.cache-zlib.outputs.cache-hit != 'true'
      run: |
        wget -nc https://zlib.net/zlib-${{ env.ZLIB_VERSION }}.tar.gz
        tar -xf zlib-${{ env.ZLIB_VERSION }}.tar.gz

    - name: Build and install zlib
      run: |
        cd zlib-${{ env.ZLIB_VERSION }}
        export CC=musl-gcc
        export CFLAGS="-O3 -fPIC"
        export LDFLAGS="-static"
        ./configure --prefix=/opt/zlib --static
        make -j$(($(nproc) + 1))
        sudo make install

    - name: Check zlib installation
      run: |
        ls -la /opt/zlib/
        if [ ! -f "/opt/zlib/lib/libz.a" ]; then
          echo "zlib static library missing!"
          exit 1
        fi

    - name: Cache Nginx
      id: cache-nginx
      uses: actions/cache@main
      with:
        path: |
          ./nginx-${{ env.NGINX_VERSION }}/
        key: ${{ runner.os }}-nginx-source-musl-static-v3-${{ matrix.arch }}-${{ env.NGINX_VERSION }}

    - name: Download Nginx
      if: steps.cache-nginx.outputs.cache-hit != 'true'
      run: |
        wget -nc https://nginx.org/download/nginx-${{ env.NGINX_VERSION }}.tar.gz
        tar -zxvf nginx-${{ env.NGINX_VERSION }}.tar.gz

    - name: Check Nginx download
      run: |
        ls -la ./nginx-${{ env.NGINX_VERSION }}/
        if [ ! -d "./nginx-${{ env.NGINX_VERSION }}/" ]; then
          echo "Nginx download failed!"
          exit 1
        fi

    - name: Verify musl static link flags
      run: |
        set -x
        static_ld_args=("-static" "-L/opt/jemalloc/lib" "-L/opt/zlib/lib" "-L/opt/pcre2/lib" "-Wl,--start-group" "-Wl,--whole-archive" "-ljemalloc" "-Wl,--no-whole-archive" "-lz" "-lpcre2-8" "-lpthread" "-ldl" "-lm" "-Wl,--end-group")
        printf '%s\n' \
          '#include <stdlib.h>' \
          'int main(void) { void *p = malloc(16); free(p); return 0; }' \
          > /tmp/musl-static-link-test.c
        musl-gcc -O2 /tmp/musl-static-link-test.c "${static_ld_args[@]}" -o /tmp/musl-static-link-test
        file /tmp/musl-static-link-test
        needed_output=$(objdump -p /tmp/musl-static-link-test | grep NEEDED || true)
        if [ -n "$needed_output" ]; then
          echo "musl static link test failed: dynamic NEEDED entries found."
          echo "$needed_output"
          exit 1
        fi

    - name: Clean OpenSSL build artifacts
      run: |
        cd openssl-${{ env.OPENSSL_VERSION }}
        make distclean 2>/dev/null || true

    - name: Add Linux kernel headers for musl-gcc
      run: |
        MUSL_INC_DIR=$(find /usr/include -maxdepth 1 -type d -name '*-linux-musl' 2>/dev/null | head -1)
        if [ -n "$MUSL_INC_DIR" ]; then
          sudo ln -sf /usr/include/linux "$MUSL_INC_DIR/linux"
          sudo ln -sf /usr/include/asm-generic "$MUSL_INC_DIR/asm-generic"
          ARCH_ASM_DIR=$(find /usr/include -maxdepth 2 -path '*/asm' -type d 2>/dev/null | grep -v linux-musl | head -1)
          if [ -n "$ARCH_ASM_DIR" ]; then
            sudo ln -sf "$ARCH_ASM_DIR" "$MUSL_INC_DIR/asm"
            echo "Linked asm from $ARCH_ASM_DIR"
          else
            echo "ERROR: architecture-specific asm directory not found"
            exit 1
          fi
          echo "Linked kernel headers in $MUSL_INC_DIR"
          ls -la "$MUSL_INC_DIR/linux" "$MUSL_INC_DIR/asm" "$MUSL_INC_DIR/asm-generic"
        else
          echo "ERROR: musl include directory not found"
          exit 1
        fi

    - name: Build Nginx as a musl static binary
      run: |
        cd nginx-${{ env.NGINX_VERSION }}
        export CC=musl-gcc
        static_cc_opt="-O3 -fPIC -static -static-libgcc -I/opt/jemalloc/include -I/opt/zlib/include -I/opt/pcre2/include"
        static_ld_opt="-static -L/opt/jemalloc/lib -L/opt/zlib/lib -L/opt/pcre2/lib -Wl,--start-group -Wl,--whole-archive -ljemalloc -Wl,--no-whole-archive -lz -lpcre2-8 -lpthread -ldl -lm -Wl,--end-group"

        ./configure --prefix=/usr/local/nginx \
          --user=nobody \
          --group=nogroup \
          --with-http_ssl_module \
          --with-http_gzip_static_module \
          --with-http_stub_status_module \
          --with-http_realip_module \
          --with-http_secure_link_module \
          --with-http_slice_module \
          --with-stream \
          --with-stream_ssl_module \
          --with-stream_realip_module \
          --with-stream_ssl_preread_module \
          --with-http_sub_module \
          --with-http_v2_module \
          --with-http_v3_module \
          --with-pcre-jit \
          --with-cc=musl-gcc \
          --with-cc-opt="$static_cc_opt" \
          --with-ld-opt="$static_ld_opt" \
          --with-openssl="$(pwd)/../openssl-${{ env.OPENSSL_VERSION }}" \
          --with-openssl-opt='no-shared no-dso no-engine no-tests no-legacy'

        make -j$(($(nproc) + 1))
        sudo make install

    - name: Check Nginx installation
      run: |
        ls -la /usr/local/nginx/
        if [ ! -f "/usr/local/nginx/sbin/nginx" ]; then
          echo "Nginx installation failed!"
          exit 1
        fi

    - name: Verify musl static Nginx binary
      run: |
        set -x
        nginx_binary="/usr/local/nginx/sbin/nginx"
        report_file="build-static-report-${{ matrix.arch }}.txt"
        nginx_v_output=$($nginx_binary -V 2>&1)
        file_output=$(file "$nginx_binary")
        needed_output=$(objdump -p "$nginx_binary" | grep NEEDED || true)
        ldd_output=$(ldd "$nginx_binary" 2>&1 || true)
        glibc_nss_output=$(strings -a "$nginx_binary" | grep -E 'libnss_|/etc/nsswitch\.conf|libc\.so\.6|__nss_|nss_database|glibc-ld|glibc\.rtld' || true)

        {
          echo "Architecture: ${{ matrix.arch }}"
          echo "File output: $file_output"
          echo
          echo "ldd output:"
          echo "$ldd_output"
          echo
          echo "objdump NEEDED entries:"
          echo "${needed_output:-none}"
          echo
          echo "glibc/NSS markers:"
          echo "${glibc_nss_output:-none}"
          echo
          echo "nginx -V:"
          echo "$nginx_v_output"
        } | tee "$report_file"

        if ! echo "$file_output" | grep -qi "statically linked"; then
          echo "Nginx verification failed: binary is not fully static."
          exit 1
        fi

        if [ -n "$needed_output" ]; then
          echo "Nginx verification failed: dynamic NEEDED entries found."
          exit 1
        fi

        if ! echo "$nginx_v_output" | grep -q -- "--with-cc=musl-gcc"; then
          echo "Nginx verification failed: nginx -V does not show musl-gcc."
          exit 1
        fi

        if [ -n "$glibc_nss_output" ]; then
          echo "Nginx verification failed: glibc/NSS markers found in the static binary."
          exit 1
        fi

    - name: Test Nginx functionality
      run: |
        set -x
        nginx_binary="/usr/local/nginx/sbin/nginx"

        sudo mkdir -p /usr/local/nginx/logs /usr/local/nginx/client_body_temp /usr/local/nginx/proxy_temp /usr/local/nginx/fastcgi_temp /usr/local/nginx/uwsgi_temp /usr/local/nginx/scgi_temp
        sudo chown -R nobody:nogroup /usr/local/nginx/logs /usr/local/nginx/client_body_temp /usr/local/nginx/proxy_temp /usr/local/nginx/fastcgi_temp /usr/local/nginx/uwsgi_temp /usr/local/nginx/scgi_temp
        sudo chmod 755 /usr/local/nginx/logs /usr/local/nginx/client_body_temp /usr/local/nginx/proxy_temp /usr/local/nginx/fastcgi_temp /usr/local/nginx/uwsgi_temp /usr/local/nginx/scgi_temp
        sudo chown -R root:root /usr/local/nginx/conf /usr/local/nginx/html
        sudo chmod 755 /usr/local/nginx/conf /usr/local/nginx/html
        sudo chmod 644 /usr/local/nginx/conf/*

        config_test=$(sudo $nginx_binary -t 2>&1)
        echo "$config_test"
        if echo "$config_test" | grep -q "test failed"; then
          echo "Nginx configuration test failed!"
          exit 1
        fi

        sudo $nginx_binary
        sleep 2

        if ! pgrep -x "nginx" > /dev/null; then
          echo "Nginx failed to start!"
          exit 1
        fi

        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
        echo "HTTP response code: $response"
        if [ "$response" != "200" ] && [ "$response" != "301" ]; then
          echo "Nginx is not responding correctly!"
          exit 1
        fi

        sudo $nginx_binary -s stop
        sleep 1

        if pgrep -x "nginx" > /dev/null; then
          echo "Nginx failed to stop!"
          exit 1
        fi

    - name: Test Xray_bash_onekey Nginx configs
      run: |
        set -x
        nginx_binary="/usr/local/nginx/sbin/nginx"
        test_root="$(mktemp -d)"
        nginx_group="$(id -gn nobody 2>/dev/null || echo nogroup)"
        mkdir -p "$test_root/conf/nginx" "$test_root/cert" "$test_root/html" "$test_root/logs"
        openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
          -subj "/CN=example.com" \
          -keyout "$test_root/cert/xray.key" \
          -out "$test_root/cert/xray.crt"

        cat > "$test_root/conf/nginx/127.0.0.1.wsServers" <<EOF
        server 127.0.0.1:20001 weight=50 max_fails=2 fail_timeout=10;
        EOF
        cat > "$test_root/conf/nginx/127.0.0.1.grpcServers" <<EOF
        server 127.0.0.1:30001 weight=50 max_fails=2 fail_timeout=10;
        EOF
        cat > "$test_root/conf/nginx/127.0.0.1.xhttpServers" <<EOF
        server 127.0.0.1:40001 weight=50 max_fails=2 fail_timeout=10;
        EOF
        cat > "$test_root/conf/nginx/example.com.serverNames" <<EOF
        example.com reality;
        EOF
        cat > "$test_root/conf/nginx/127.0.0.1.realityServers" <<EOF
        server 127.0.0.1:9443 weight=50 max_fails=2 fail_timeout=10;
        EOF

        cat > "$test_root/conf/nginx/02-xray-server.conf" <<EOF
        upstream xray-ws-server {
            include $test_root/conf/nginx/*.wsServers;
        }

        upstream xray-grpc-server {
            include $test_root/conf/nginx/*.grpcServers;
        }

        upstream xray-xhttp-server {
            include $test_root/conf/nginx/*.xhttpServers;
        }
        EOF

        cat > "$test_root/conf/nginx/00-xray.conf" <<EOF
        server {
            listen 8443 ssl reuseport;
            listen [::]:8443 ssl reuseport;
            listen 8443 quic reuseport;
            listen [::]:8443 quic reuseport;

            http2 on;
            ssl_certificate       $test_root/cert/xray.crt;
            ssl_certificate_key   $test_root/cert/xray.key;
            ssl_protocols         TLSv1.3;
            server_name           example.com;
            root $test_root/html;

            location /grpc {
                grpc_pass grpc://xray-grpc-server;
                grpc_connect_timeout 60s;
                grpc_read_timeout 720m;
                grpc_send_timeout 720m;
                grpc_set_header X-Real-IP \$remote_addr;
                grpc_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            }

            location /ws {
                proxy_pass http://xray-ws-server;
                proxy_http_version 1.1;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host \$http_host;
            }

            location /xhttp {
                grpc_pass grpc://xray-xhttp-server;
                grpc_connect_timeout 60s;
                grpc_read_timeout 720m;
                grpc_send_timeout 720m;
                grpc_set_header X-Real-IP \$remote_addr;
                grpc_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                grpc_set_header Early-Data \$ssl_early_data;
            }
        }
        EOF

        cat > "$test_root/tls-nginx.conf" <<EOF
        user nobody $nginx_group;
        worker_processes auto;
        events {
            worker_connections 4096;
        }
        http {
            server_tokens off;
            include $test_root/conf/nginx/*.conf;
        }
        EOF

        cat > "$test_root/reality-nginx.conf" <<EOF
        user nobody $nginx_group;
        worker_processes auto;
        events {
            worker_connections 4096;
        }
        stream {
            map \$ssl_preread_protocol \$is_valid_protocol {
                TLSv1.3 1;
                default 0;
            }

            map \$ssl_preread_server_name \$sni_upstream {
                include $test_root/conf/nginx/*.serverNames;
                default deny;
            }

            map "\$sni_upstream:\$is_valid_protocol" \$final_upstream {
                ~^reality:1\$ reality;
                default deny;
            }

            upstream reality {
                include $test_root/conf/nginx/*.realityServers;
            }

            upstream deny {
                server 127.0.0.1:9403;
            }

            server {
                listen 9444 reuseport so_keepalive=on backlog=65535;
                proxy_pass \$final_upstream;
                ssl_preread on;
                proxy_connect_timeout 5s;
                proxy_timeout 300s;
            }

            server {
                listen 127.0.0.1:9403 reuseport;
                ssl_reject_handshake on;
                return 444;
                access_log off;
                error_log /dev/null;
            }
        }
        EOF

        sudo "$nginx_binary" -t -p "$test_root/" -c "$test_root/tls-nginx.conf"
        sudo "$nginx_binary" -t -p "$test_root/" -c "$test_root/reality-nginx.conf"

    - name: Create package
      run: |
        package_file="xray-nginx-custom-${{ matrix.arch }}.tar.gz"
        mkdir -p package/nginx
        cp -r /usr/local/nginx/* package/nginx/
        cd package
        tar -czvf "../$package_file" nginx/
        cd ..
        sha256sum "$package_file" | tee "$package_file.sha256"

    - name: Generate build metadata
      run: |
        package_file="xray-nginx-custom-${{ matrix.arch }}.tar.gz"
        package_sha=$(sha256sum "$package_file" | awk '{print $1}')
        package_size=$(wc -c < "$package_file" | tr -d ' ')
        binary_sha=$(sha256sum /usr/local/nginx/sbin/nginx | awk '{print $1}')
        jq -n \
          --arg arch "${{ matrix.arch }}" \
          --arg filename "$package_file" \
          --arg sha256 "$package_sha" \
          --arg size_bytes "$package_size" \
          --arg binary_sha256 "$binary_sha" \
          --arg link_mode "musl-static" \
          --arg static_report "build-static-report-${{ matrix.arch }}.txt" \
          --arg nginx_build_version "$NGINX_BUILD_VERSION" \
          --arg nginx_version "$NGINX_VERSION" \
          --arg openssl_version "$OPENSSL_VERSION" \
          --arg jemalloc_version "$JEMALLOC_VERSION" \
          --arg pcre2_version "$PCRE_VERSION" \
          --arg zlib_version "$ZLIB_VERSION" \
          --arg build_time "$BUILD_TIME" \
          --arg build_image "$BUILD_IMAGE" \
          --arg runner_os "${{ matrix.os }}" \
          '{
            arch: $arch,
            filename: $filename,
            sha256: $sha256,
            size_bytes: ($size_bytes | tonumber),
            binary_sha256: $binary_sha256,
            link_mode: $link_mode,
            static_report: $static_report,
            versions: {
              nginx_build: $nginx_build_version,
              nginx: $nginx_version,
              openssl: $openssl_version,
              jemalloc: $jemalloc_version,
              pcre2: $pcre2_version,
              zlib: $zlib_version
            },
            build: {
              time: $build_time,
              image: $build_image,
              runner_os: $runner_os
            }
          }' > "build-metadata-${{ matrix.arch }}.json"

    - name: Upload artifact
      uses: actions/upload-artifact@main
      with:
        name: xray-nginx-custom-${{ matrix.arch }}
        path: |
          xray-nginx-custom-${{ matrix.arch }}.tar.gz
          xray-nginx-custom-${{ matrix.arch }}.tar.gz.sha256
          build-metadata-${{ matrix.arch }}.json
          build-static-report-${{ matrix.arch }}.txt

  upload-release-assets:
    needs: [check-versions, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Set environment variables
      run: |
        {
          echo "NGINX_BUILD_VERSION=${{ needs.check-versions.outputs.release_version }}"
          echo "NGINX_VERSION=${{ needs.check-versions.outputs.nginx_version }}"
          echo "OPENSSL_VERSION=${{ needs.check-versions.outputs.openssl_version }}"
          echo "JEMALLOC_VERSION=${{ needs.check-versions.outputs.jemalloc_version }}"
          echo "PCRE_VERSION=${{ needs.check-versions.outputs.pcre_version }}"
          echo "ZLIB_VERSION=${{ needs.check-versions.outputs.zlib_version }}"
        } >> "$GITHUB_ENV"

    - name: Download build artifacts
      uses: actions/download-artifact@main
      with:
        path: artifacts
        pattern: xray-nginx-custom-*
        merge-multiple: true

    - name: Generate tag name
      id: generate_tag
      run: |
        echo "TAG_NAME=v${NGINX_BUILD_VERSION}" >> "$GITHUB_ENV"

    - name: Generate release manifest
      run: |
        generated_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
        workflow_run="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        jq -s \
          --arg schema_version "1" \
          --arg tag "$TAG_NAME" \
          --arg generated_at "$generated_at" \
          --arg repository "$GITHUB_REPOSITORY" \
          --arg workflow_run "$workflow_run" \
          --arg nginx_build_version "$NGINX_BUILD_VERSION" \
          --arg nginx_version "$NGINX_VERSION" \
          --arg openssl_version "$OPENSSL_VERSION" \
          --arg jemalloc_version "$JEMALLOC_VERSION" \
          --arg pcre2_version "$PCRE_VERSION" \
          --arg zlib_version "$ZLIB_VERSION" \
          '{
            schema_version: ($schema_version | tonumber),
            tag: $tag,
            generated_at: $generated_at,
            source: {
              repository: $repository,
              workflow_run: $workflow_run
            },
            versions: {
              nginx_build: $nginx_build_version,
              nginx: $nginx_version,
              openssl: $openssl_version,
              jemalloc: $jemalloc_version,
              pcre2: $pcre2_version,
              zlib: $zlib_version
            },
            assets: sort_by(.arch)
          }' artifacts/build-metadata-*.json > artifacts/release-manifest.json

        (
          cd artifacts
          sha256sum xray-nginx-custom-*.tar.gz release-manifest.json > SHA256SUMS
        )

    - name: Check if tag already exists
      id: check_tag
      run: |
        if curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ github.token }}" "https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" | grep -q "200"; then
          echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${TAG_NAME} already exists, skipping release."
        else
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload release assets
      if: steps.check_tag.outputs.tag_exists != 'true'
      uses: ncipollo/release-action@main
      with:
        artifacts: "artifacts/xray-nginx-custom-*.tar.gz,artifacts/xray-nginx-custom-*.tar.gz.sha256,artifacts/build-metadata-*.json,artifacts/build-static-report-*.txt,artifacts/release-manifest.json,artifacts/SHA256SUMS"
        tag: "${{ env.TAG_NAME }}"
        body: "Nginx ${{ env.NGINX_VERSION }} custom musl-static build for Xray_bash_onekey.\n\nOpenSSL Version: ${{ env.OPENSSL_VERSION }}\nJemalloc Version: ${{ env.JEMALLOC_VERSION }}\nPCRE2 Version: ${{ env.PCRE_VERSION }}\nzlib Version: ${{ env.ZLIB_VERSION }}\n\nThe release includes release-manifest.json, per-asset SHA256 files, SHA256SUMS, and musl static-link verification reports."
        draft: false
        prerelease: false
        allowUpdates: true

  update-previous-versions:
    needs: [check-versions, upload-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Download current version metadata
      uses: actions/download-artifact@main
      with:
        name: current-versions
        path: current-versions

    - name: Commit released versions
      run: |
        current_versions_file=$(find current-versions -name current_versions.json -print -quit)
        if [ -z "$current_versions_file" ]; then
          echo "current_versions.json artifact not found"
          exit 1
        fi
        jq --arg nginx_build_version "${{ needs.check-versions.outputs.release_version }}" \
          '{nginx_online_version, openssl_online_version, jemalloc_online_version, pcre2_online_version, zlib_online_version, nginx_build_online_version: $nginx_build_version}' \
          "$current_versions_file" > .github/previous_versions.json
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .github/previous_versions.json
        git commit -m "Update previous_versions.json with released versions" || exit 0
        git push origin main

  cleanup-old-releases:
    needs: upload-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Cleanup old releases
      run: |
        RELEASES=$(curl -s -H "Authorization: token ${{ github.token }}" "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100")
        RELEASE_IDS=$(echo "$RELEASES" | jq -r 'sort_by(.created_at) | reverse | .[].id')
        TOTAL_RELEASES=$(echo "$RELEASE_IDS" | wc -l)
        echo "Total releases: $TOTAL_RELEASES"

        KEEP_COUNT=5
        COUNT=0

        echo "$RELEASE_IDS" | while read -r RELEASE_ID; do
          COUNT=$((COUNT+1))
          if [ $COUNT -gt $KEEP_COUNT ]; then
            echo "Deleting release with ID: $RELEASE_ID"
            curl -s -X DELETE -H "Authorization: token ${{ github.token }}" "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          else
            echo "Keeping release with ID: $RELEASE_ID"
          fi
        done
